<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="estilos.css" />
    <title #inicio>Articulos</title>
  </head>
  <body>
    <main id="web-container">
      <header class="header-art">
        <h1 id="titulo-web">[AQUÍ_VA_EL_TITULO]</h1>
        <p id="autor-web">Por: [AQUÍ_VA_EL_AUTOR]</p>
      </header>
      <div id="imagen-contenedor">
        <img
          id="imagen-web"
          src="https://images.unsplash.com/photo-1518837695005-2083093ee35b?auto=format&fit=crop&w=800&q=80"
          alt="Imagen del artículo"
        />
      </div>
      <section>
        <h2 id="descripcion-tag">[AQUÍ_VA_EL_TEXTO_DESCRIPCION]</h2>
        <p id="contenido-web">[AQUÍ_VA_EL_CONTENIDO_DEL_ARTICULO]</p>
      </section>
      <footer id="footer-art">
        <span id="fecha-web">Fecha de publicación: [AQUÍ_VA_LA_FECHA]</span>
      </footer>
    </main>
    <script src="articulo.js"></script>
  </body>
</html>
