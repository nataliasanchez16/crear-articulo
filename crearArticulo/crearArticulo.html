<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="styles.css" />
    <title>Articulos</title>
  </head>
  <body>
    <div>
      <button id="toggle-dark-mode" class="btn-dark-mode">Cambiar Modo</button>
      Formulario de Artículos
      <form id="formularioArticulo">
        <h2>Titulo</h2>
        <label for="title">Titulo:</label>
        <input
          type="text"
          id="title"
          name="title"
          placeholder="Ingresa el titulo del articulo"
          required
        />
        <label for="autor">Autor:</label>
        <input
          type="text"
          id="autor"
          name="autor"
          placeholder="Ingresa el autor del articulo"
          required
        />
        <h4>Subtítulo</h4>
        <label for="subtitulo">Subtítulo:</label>
        <input
          type="text"
          id="subtitulo"
          name="subtitulo"
          placeholder="Ingresa el subtítulo del articulo"
          required
        />

        <h2>Imagen</h2>
        <label for="imagen">Imagen (URL):</label>
        <input
          type="text"
          id="imagen"
          name="imagen"
          placeholder="Pega la URL de la imagen"
        />
        <label for="descripcion">Descripcion:</label>
        <textarea
          id="descripcion"
          name="descripcion"
          placeholder="Ingresa la descripcion de la imagen"
          required
        ></textarea>
        <h2>Contenido</h2>
        <label for="content">Contenido:</label>
        <textarea
          id="content"
          name="content"
          placeholder="Ingresa el contenido del articulo"
          required
        ></textarea>
        <h2>Imagen 2</h2>
        <label for="imagen2">Imagen (URL):</label>
        <input
          type="text"
          id="imagen2"
          name="imagen"
          placeholder="Pega la URL de la imagen"
        />
        <label for="descripcion2">Descripcion 2:</label>
        <textarea
          id="descripcion2"
          name="descripcion"
          placeholder="Ingresa la descripcion de la imagen"
          required
        ></textarea>
        <h2>Contenido 2</h2>
        <label for="content2">Contenido 2:</label>
        <textarea
          id="content2"
          name="content"
          placeholder="Ingresa el contenido del articulo"
          required
        ></textarea>
        <h2>Fecha</h2>
        <label for="date">Fecha:</label>
        <input type="date" id="date" name="date" required />
        <button type="submit" id="boton">Enviar</button>
      </form>
      <p id="mensaje"></p>
    </div>
    <script src="form.js"></script>
  </body>
</html>
