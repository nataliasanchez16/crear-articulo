<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="styles.css" />
    <title>Articulos</title>
  </head>
  <body>
    <div>
      Formulario de Artículos
      <form id="formularioArticulo">
        <h2>Titulo</h2>
        <label for="title">Titulo:</label>
        <input
          type="text"
          id="title"
          name="title"
          placeholder="Ingresa el titulo del articulo"
          required
        />
        <label for="autor">Autor:</label>
        <input
          type="text"
          id="autor"
          name="autor"
          placeholder="Ingresa el autor del articulo"
          required
        />
        <h2>Imagen</h2>
        <label for="imagen">Imagen:</label>
        <input type="file" id="imagen" name="imagen" accept="image/*" />
        <label for="descripcion">Descripcion:</label>
        <textarea
          id="descripcion"
          name="descripcion"
          placeholder="Ingresa la descripcion de la imagen"
          required
        ></textarea>
        <h2>Contenido</h2>
        <label for="content">Contenido:</label>
        <textarea
          id="content"
          name="content"
          placeholder="Ingresa el contenido del articulo"
          required
        ></textarea>
        <h2>Fecha</h2>
        <label for="date">Fecha:</label>
        <input type="date" id="date" name="date" required />
        <button type="submit" id="boton">Enviar</button>
      </form>
      <p id="mensaje"></p>
    </div>
    <script src="form.js"></script>
  </body>
</html>
