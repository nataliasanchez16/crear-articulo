<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="styles.css" />

    <title #inicio>Articulos</title>
  </head>
  <body>
    <h2>Titulo</h2>
    <form action="/title" method="GET">
      <input
        type="text"
        id="title"
        name="title"
        placeholder="Ingresa el titulo del articulo"
        required
      />
    </form>
    <div class="separator">
      <img
        src="https://previews.123rf.com/images/welcomia/welcomia1109/welcomia110900028/10643224-water-waves-background-blue-tones-water-surface-vertical-photography.jpg"
        alt="Imagen de ejemplo"
        class="example-image"
      />
      <h2>Contenido2</h2>
      <form action="/content" method="GET">
        <textarea
          id="content"
          name="content"
          placeholder="Ingresa el contenido del articulo"
          required
        ></textarea>
      </form>
    </div>
    <div class="separator2">
      <img
        src="https://previews.123rf.com/images/welcomia/welcomia1109/welcomia110900028/10643224-water-waves-background-blue-tones-water-surface-vertical-photography.jpg"
        alt="Imagen de ejemplo"
        class="example-image"
      />
    </div>
    <h2>Contenido</h2>
    <form action="/content" method="GET">
      <textarea
        id="content"
        name="content"
        placeholder="Ingresa el contenido del articulo"
        required
      ></textarea>
    </form>
  </body>
</html>
